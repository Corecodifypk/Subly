org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m -XX:ReservedCodeCacheSize=256m -Dfile.encoding=UTF-8
android.useAndroidX=true

# Limit workers — avoids OOM on 16 GB RAM machines during parallel Kotlin/Java compiles.
org.gradle.parallel=false
org.gradle.workers.max=1
org.gradle.caching=false
org.gradle.configuration-cache=false

# Project is on D: but Pub cache is on C: — Kotlin incremental compilation breaks across drives.
kotlin.incremental=false
kotlin.daemon.enabled=false
kotlin.compiler.execution.strategy=in-process
